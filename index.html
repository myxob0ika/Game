<script>
/** ПРОЦЕДУРНЫЕ ТЕКСТУРЫ **/
function createWallTexture() {
    const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256; const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#9e8538'; ctx.fillRect(0, 0, 256, 256); 
    for (let i = 0; i < 15000; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? 'rgba(0,0,0,0.08)' : 'rgba(80,60,10,0.08)';
        ctx.fillRect(Math.random() * 256, Math.random() * 256, 2, 2);
    }
    for (let x = 0; x < 256; x += 16) {
        ctx.fillStyle = 'rgba(100, 80, 20, 0.3)'; ctx.fillRect(x, 0, 2, 256);
    }
    ctx.fillStyle = '#261e0e'; ctx.fillRect(0, 240, 256, 16); ctx.fillStyle = '#362a13'; ctx.fillRect(0, 0, 256, 8);
    const tex = new THREE.CanvasTexture(canvas); tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; return tex;
}

function createFloorTexture() {
    const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256; const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#3a321a'; ctx.fillRect(0, 0, 256, 256);
    for (let i = 0; i < 40000; i++) {
        let val = Math.floor(Math.random() * 30) - 15;
        ctx.fillStyle = `rgb(${50 + val}, ${40 + val}, ${20 + val})`;
        ctx.fillRect(Math.random() * 256, Math.random() * 256, 2, 2);
    }
    const tex = new THREE.CanvasTexture(canvas); tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; return tex;
}

function createCeilingTexture() {
    const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256; const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#b8b4a7'; ctx.fillRect(0, 0, 256, 256);
    ctx.strokeStyle = '#858175'; ctx.lineWidth = 2;
    for (let x = 0; x <= 256; x += 64) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 256); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, x); ctx.lineTo(256, x); ctx.stroke();
    }
    const tex = new THREE.CanvasTexture(canvas); tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; return tex;
}

function createLampTexture() {
    const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256; const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#b8b4a7'; ctx.fillRect(0, 0, 256, 256);
    ctx.fillStyle = '#ffffe6'; ctx.fillRect(66, 66, 124, 124);
    ctx.shadowColor = '#ffffaa'; ctx.shadowBlur = 20; ctx.fillRect(66, 66, 124, 124);
    return new THREE.CanvasTexture(canvas);
}

/** МОДЕЛЬ СЕСТРЫ С ФОНАРИКОМ **/
function createPlayerModel() {
    const group = new THREE.Group();
    const suitColor = new THREE.MeshLambertMaterial({ color: 0xc9a41c }); 
    const darkColor = new THREE.MeshLambertMaterial({ color: 0x111111 }); 

    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.35, 1.2, 8), suitColor);
    body.position.y = 1.1; group.add(body);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 8, 8), suitColor);
    head.position.y = 1.9; group.add(head);
    const visor = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.2, 0.25), darkColor);
    visor.position.set(0, 0, 0.2); head.add(visor);

    const limbGeo = new THREE.CylinderGeometry(0.12, 0.1, 0.8, 8); limbGeo.translate(0, -0.35, 0); 
    const leftLeg = new THREE.Mesh(limbGeo, suitColor); leftLeg.position.set(-0.18, 0.6, 0); group.add(leftLeg);
    const rightLeg = new THREE.Mesh(limbGeo, suitColor); rightLeg.position.set(0.18, 0.6, 0); group.add(rightLeg);
    const leftArm = new THREE.Mesh(limbGeo, suitColor); leftArm.position.set(-0.45, 1.5, 0); group.add(leftArm);
    const rightArm = new THREE.Mesh(limbGeo, suitColor); rightArm.position.set(0.45, 1.5, 0); group.add(rightArm);

    // Добавляем свет к самой модели напарника, чтобы ее было лучше видно!
    const partnerLight = new THREE.PointLight(0xffebb3, 1.0, 10);
    partnerLight.position.set(0, 1.5, 0);
    group.add(partnerLight);

    group.userData = { leftLeg, rightLeg, leftArm, rightArm, targetPos: new THREE.Vector3(), targetYaw: 0 };
    return group;
}

/** АУДИО **/
class AudioSystem {
    constructor() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.delay = this.ctx.createDelay(); this.delay.delayTime.value = 0.35;
        this.feedback = this.ctx.createGain(); this.feedback.gain.value = 0.4;
        this.delay.connect(this.feedback); this.feedback.connect(this.delay);
        this.effectOut = this.ctx.createGain(); this.effectOut.gain.value = 0.6;
        this.delay.connect(this.effectOut); this.effectOut.connect(this.ctx.destination);
    }
    startAtmosphere() {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const humOsc = this.ctx.createOscillator(); humOsc.type = 'sawtooth'; humOsc.frequency.value = 55;
        const filter = this.ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 150;
        this.humGain = this.ctx.createGain(); this.humGain.gain.value = 0.25;
        humOsc.connect(filter); filter.connect(this.humGain); this.humGain.connect(this.ctx.destination);
        humOsc.start();
    }
    playFootstep() {
        if (this.ctx.state === 'suspended') return;
        const bufferSize = this.ctx.sampleRate * 0.1; const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize / 4));
        const noise = this.ctx.createBufferSource(); noise.buffer = buffer;
        const filter = this.ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 600;
        const gain = this.ctx.createGain(); gain.gain.value = 0.15;
        noise.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination); gain.connect(this.delay); noise.start();
    }
    playScream() {
        if (this.ctx.state === 'suspended') return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator(); osc.type = 'sawtooth';
        const lfo = this.ctx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 8;
        const lfoGain = this.ctx.createGain(); lfoGain.gain.value = 50;
        lfo.connect(lfoGain); lfoGain.connect(osc.frequency); lfo.start(now);
        osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(800, now + 1); osc.frequency.exponentialRampToValueAtTime(100, now + 3);
        const filter = this.ctx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 1000; 
        const gain = this.ctx.createGain(); gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.1, now + 1); gain.gain.linearRampToValueAtTime(0, now + 3.5);
        osc.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination); gain.connect(this.delay);
        osc.start(now); osc.stop(now + 4); lfo.stop(now + 4);
    }
}

/** ИГРА **/
class Game {
    constructor() {
        this.canvas = document.getElementById('game-canvas');
        this.scene = new THREE.Scene();
        this.scene.fog = new THREE.FogExp2(0x110f08, 0.06); 
        this.scene.background = new THREE.Color(0x110f08);

        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 80);
        this.renderer = new THREE.WebGLRenderer({ canvas: this.canvas, antialias: false });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));

        this.audio = new AudioSystem();
        this.cellSize = 4; this.chunkRadius = 10;
        
        this.player = { height: 2.5, speed: 3.8, moveForward: 0, moveRight: 0, yaw: 0, pitch: 0, stepTimer: 0, falling: false, fallSpeed: 0 };
        
        // ИСПРАВЛЕНИЕ: Даем случайное отклонение при спавне, чтобы не появиться внутри напарника
        let spawnOffset = (Math.random() - 0.5) * 2.0;
        this.camera.position.set(spawnOffset, this.player.height, spawnOffset);
        
        // Игрок смотрит в центр комнаты
        this.player.yaw = Math.PI + spawnOffset;

        this.scene.add(new THREE.AmbientLight(0x1a160d, 0.4));
        this.playerLight = new THREE.PointLight(0xffebb3, 1.3, 16);
        this.scene.add(this.playerLight);

        this.touches = { moveId: null, lookId: null, moveStart: {x:0, y:0}, lastLook: {x:0, y:0} };
        this.paranoiaTimer = 0; this.lastGridX = -999; this.lastGridZ = -999;
        this.lastSync = 0;

        // Инициализация модели сестры
        this.remotePlayerModel = createPlayerModel();
        this.remotePlayerModel.position.set(0, -1000, 0); 
        this.scene.add(this.remotePlayerModel);

        this.initWorld();
        this.setupInput();
        this.clock = new THREE.Clock();
        this.animate = this.animate.bind(this);
    }

    initWorld() {
        const maxInstances = (this.chunkRadius * 2 + 1) ** 2;
        const planeGeo = new THREE.PlaneGeometry(this.cellSize, this.cellSize);
        const wallGeo = new THREE.BoxGeometry(this.cellSize, 5, this.cellSize);
        
        this.wallsMesh = new THREE.InstancedMesh(wallGeo, new THREE.MeshLambertMaterial({ map: createWallTexture() }), maxInstances);
        this.floorMesh = new THREE.InstancedMesh(planeGeo, new THREE.MeshLambertMaterial({ map: createFloorTexture() }), maxInstances);
        this.ceilMesh = new THREE.InstancedMesh(planeGeo, new THREE.MeshLambertMaterial({ map: createCeilingTexture() }), maxInstances);
        this.ceilLampMesh = new THREE.InstancedMesh(planeGeo, new THREE.MeshBasicMaterial({ map: createLampTexture(), color: 0xffffee }), maxInstances);

        this.wallsMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage); this.floorMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        this.ceilMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage); this.ceilLampMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

        this.scene.add(this.wallsMesh); this.scene.add(this.floorMesh);
        this.scene.add(this.ceilMesh); this.scene.add(this.ceilLampMesh);
        this.updateMazeChunks(0, 0, true);
    }

    pseudoRandom(x, z) {
        let n = Math.sin(x * 12.9898 + z * 78.233) * 43758.5453;
        return n - Math.floor(n);
    }

    isWall(gx, gz) {
        if (Math.abs(gx) <= 1 && Math.abs(gz) <= 1) return false; 
        let nx = gx * 0.35; let nz = gz * 0.35;
        let noise1 = Math.sin(nx) + Math.cos(nz);
        let noise2 = Math.sin(nx * 1.5 + 2.0) * Math.cos(nz * 1.5 + 1.0);
        let chaoticNoise = this.pseudoRandom(gx, gz) * 0.6 - 0.3; 
        return Math.abs(noise1 * 0.5 + noise2 * 0.5 + chaoticNoise) > 0.38; 
    }

    isPit(gx, gz) {
        if (Math.abs(gx) <= 2 && Math.abs(gz) <= 2) return false;
        if (this.isWall(gx, gz)) return false; 
        return this.pseudoRandom(gx + 123, gz - 456) < 0.02; 
    }

    updateMazeChunks(playerGridX, playerGridZ, force = false) {
        if (!force && playerGridX === this.lastGridX && playerGridZ === this.lastGridZ) return;
        this.lastGridX = playerGridX; this.lastGridZ = playerGridZ;
        
        let wallIdx = 0, floorIdx = 0, ceilIdx = 0, lampIdx = 0;
        const dummy = new THREE.Object3D();

        for (let x = -this.chunkRadius; x <= this.chunkRadius; x++) {
            for (let z = -this.chunkRadius; z <= this.chunkRadius; z++) {
                let gx = playerGridX + x; let gz = playerGridZ + z;
                let posX = gx * this.cellSize; let posZ = gz * this.cellSize;

                if (this.isWall(gx, gz)) {
                    dummy.position.set(posX, 2.5, posZ); dummy.rotation.set(0, 0, 0); dummy.updateMatrix();
                    this.wallsMesh.setMatrixAt(wallIdx++, dummy.matrix);
                } else {
                    if (!this.isPit(gx, gz)) {
                        dummy.position.set(posX, 0, posZ); dummy.rotation.set(-Math.PI / 2, 0, 0); dummy.updateMatrix();
                        this.floorMesh.setMatrixAt(floorIdx++, dummy.matrix);
                    }
                    dummy.position.set(posX, 5, posZ); dummy.rotation.set(Math.PI / 2, 0, 0); dummy.updateMatrix();
                    if (this.pseudoRandom(gx - 50, gz + 50) < 0.15) this.ceilLampMesh.setMatrixAt(lampIdx++, dummy.matrix);
                    else this.ceilMesh.setMatrixAt(ceilIdx++, dummy.matrix);
                }
            }
        }
        dummy.position.set(0, -1000, 0); dummy.updateMatrix();
        for (let i = wallIdx; i < this.wallsMesh.count; i++) this.wallsMesh.setMatrixAt(i, dummy.matrix);
        for (let i = floorIdx; i < this.floorMesh.count; i++) this.floorMesh.setMatrixAt(i, dummy.matrix);
        for (let i = ceilIdx; i < this.ceilMesh.count; i++) this.ceilMesh.setMatrixAt(i, dummy.matrix);
        for (let i = lampIdx; i < this.ceilLampMesh.count; i++) this.ceilLampMesh.setMatrixAt(i, dummy.matrix);
        
        this.wallsMesh.instanceMatrix.needsUpdate = true; this.floorMesh.instanceMatrix.needsUpdate = true;
        this.ceilMesh.instanceMatrix.needsUpdate = true; this.ceilLampMesh.instanceMatrix.needsUpdate = true;
    }

    setupInput() {
        document.addEventListener('touchstart', (e) => {
            for(let i=0; i<e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if(t.clientX < window.innerWidth / 2) {
                    this.touches.moveId = t.identifier; this.touches.moveStart = {x: t.clientX, y: t.clientY};
                } else {
                    this.touches.lookId = t.identifier; this.touches.lastLook = {x: t.clientX, y: t.clientY};
                }
            }
        }, {passive: false});

        document.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            if(this.player.falling) return; 
            for(let i=0; i<e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if(t.identifier === this.touches.moveId) {
                    let dx = t.clientX - this.touches.moveStart.x; let dy = t.clientY - this.touches.moveStart.y;
                    this.player.moveRight = Math.max(-1, Math.min(1, dx / 40));
                    this.player.moveForward = Math.max(-1, Math.min(1, dy / 40)); 
                } else if(t.identifier === this.touches.lookId) {
                    let dx = t.clientX - this.touches.lastLook.x; let dy = t.clientY - this.touches.lastLook.y;
                    this.player.yaw -= dx * 0.005; this.player.pitch -= dy * 0.005;
                    this.player.pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, this.player.pitch));
                    this.touches.lastLook = {x: t.clientX, y: t.clientY};
                }
            }
        }, {passive: false});

        const handleTouchEnd = (e) => {
            for(let i=0; i<e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if(t.identifier === this.touches.moveId) {
                    this.touches.moveId = null; this.player.moveForward = 0; this.player.moveRight = 0;
                } else if(t.identifier === this.touches.lookId) {
                    this.touches.lookId = null;
                }
            }
        };

        document.addEventListener('touchend', handleTouchEnd); document.addEventListener('touchcancel', handleTouchEnd);
        window.addEventListener('resize', () => {
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix(); this.renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }

    checkCollision(newX, newZ) {
        const size = 0.5;
        const corners = [ {x: newX - size, z: newZ - size}, {x: newX + size, z: newZ - size}, {x: newX - size, z: newZ + size}, {x: newX + size, z: newZ + size} ];
        for(let c of corners) {
            if(this.isWall(Math.round(c.x / this.cellSize), Math.round(c.z / this.cellSize))) return true;
        }
        return false;
    }

    handleParanoia(delta) {
        this.paranoiaTimer += delta;
        if(this.paranoiaTimer > 15 + Math.random() * 20) {
            this.paranoiaTimer = 0;
            let rand = Math.random();
            if(rand < 0.3) this.audio.playScream();
            else if (rand < 0.6) {
                if (Math.abs(this.player.moveForward) < 0.1 && Math.abs(this.player.moveRight) < 0.1) {
                    setTimeout(() => this.audio.playFootstep(), 300); setTimeout(() => this.audio.playFootstep(), 800);
                }
            } else {
                this.playerLight.intensity = 0.1; setTimeout(() => this.playerLight.intensity = 1.3, 150);
            }
        }
    }

    animateMultiplayer(time) {
        if (!this.remotePlayerModel || !globalRemoteData) return;
        const m = this.remotePlayerModel;
        const d = globalRemoteData;

        // ИСПРАВЛЕНИЕ: Проверяем тайм-аут по ЛОКАЛЬНОМУ времени получения, а не по времени чужого телефона
        if (Date.now() - d.localReceiptTime > 3000) {
            m.position.set(0, -1000, 0); // Прячем, если нет сигнала 3 секунды
            return;
        }

        m.userData.targetPos.set(d.x, d.y - this.player.height, d.z);
        
        // Если это первый спавн, переносим сразу без сглаживания из-под земли
        if (m.position.y === -1000) {
            m.position.copy(m.userData.targetPos);
        } else {
            m.position.lerp(m.userData.targetPos, 0.2); // Плавное движение
        }
        
        let diff = d.yaw - m.rotation.y;
        diff = Math.atan2(Math.sin(diff), Math.cos(diff)); 
        m.rotation.y += diff * 0.2;

        if (d.isWalking && !d.falling) {
            m.userData.leftLeg.rotation.x = Math.sin(time * 10) * 0.6;
            m.userData.rightLeg.rotation.x = Math.sin(time * 10 + Math.PI) * 0.6;
            m.userData.leftArm.rotation.x = Math.sin(time * 10 + Math.PI) * 0.6;
            m.userData.rightArm.rotation.x = Math.sin(time * 10) * 0.6;
        } else if (d.falling) {
            m.userData.leftArm.rotation.x = Math.PI; m.userData.rightArm.rotation.x = Math.PI;
            m.userData.leftLeg.rotation.x = 0; m.userData.rightLeg.rotation.x = 0;
        } else {
            m.userData.leftLeg.rotation.x *= 0.8; m.userData.rightLeg.rotation.x *= 0.8;
            m.userData.leftArm.rotation.x *= 0.8; m.userData.rightArm.rotation.x *= 0.8;
        }
    }

    animate() {
        requestAnimationFrame(this.animate);
        const delta = Math.min(this.clock.getDelta(), 0.1); 
        const time = this.clock.getElapsedTime();

        if (this.player.falling) {
            this.player.fallSpeed += 15 * delta; 
            this.camera.position.y -= this.player.fallSpeed * delta;
            this.player.pitch += delta * 2; this.player.yaw += delta;
            
            if (this.camera.position.y < -40) {
                // ИСПРАВЛЕНИЕ: Возрождение с небольшим отклонением
                let spawnOffset = (Math.random() - 0.5) * 2.0;
                this.camera.position.set(spawnOffset, this.player.height, spawnOffset);
                this.player.yaw = 0; this.player.pitch = 0; this.player.falling = false; this.player.fallSpeed = 0;
                document.getElementById('death-screen').style.opacity = 0;
            }
        } else {
            const cosYaw = Math.cos(this.player.yaw); const sinYaw = Math.sin(this.player.yaw);
            let moveX = (this.player.moveRight * cosYaw + this.player.moveForward * sinYaw) * this.player.speed * delta;
            let moveZ = (this.player.moveRight * -sinYaw + this.player.moveForward * cosYaw) * this.player.speed * delta;

            if(!this.checkCollision(this.camera.position.x + moveX, this.camera.position.z)) this.camera.position.x += moveX;
            if(!this.checkCollision(this.camera.position.x, this.camera.position.z + moveZ)) this.camera.position.z += moveZ;

            let gridX = Math.round(this.camera.position.x / this.cellSize); let gridZ = Math.round(this.camera.position.z / this.cellSize);
            
            if (this.isPit(gridX, gridZ)) {
                this.player.falling = true; this.audio.playScream(); 
                document.getElementById('death-screen').style.opacity = 1; 
            }

            this.updateMazeChunks(gridX, gridZ);

            let speedAvg = Math.abs(this.player.moveForward) + Math.abs(this.player.moveRight);
            if(speedAvg > 0.1) {
                this.player.stepTimer += delta * 6;
                this.camera.position.y = this.player.height + Math.sin(this.player.stepTimer) * 0.12;
                if(Math.sin(this.player.stepTimer) < -0.9 && Math.sin(this.player.stepTimer - delta * 6) >= -0.9) this.audio.playFootstep();
            } else {
                this.camera.position.y += (this.player.height - this.camera.position.y) * 0.1;
            }
        }

        this.camera.rotation.set(0, 0, 0, 'YXZ');
        this.camera.rotateY(this.player.yaw); this.camera.rotateX(this.player.pitch);
        this.playerLight.position.set(this.camera.position.x, 4.6, this.camera.position.z);
        this.playerLight.intensity = 1.2 + Math.random() * 0.1;

        if(!this.player.falling) this.handleParanoia(delta);
        
        // ОТПРАВКА ДАННЫХ ЧЕРЕЗ БРОКЕР (Ограничитель частоты)
        if (mqttClient && mqttClient.connected && Date.now() - this.lastSync > 80) { 
            this.lastSync = Date.now();
            let isWalking = (Math.abs(this.player.moveForward) + Math.abs(this.player.moveRight)) > 0.1;
            let payload = JSON.stringify({
                id: myPlayerId,
                x: this.camera.position.x, y: this.camera.position.y, z: this.camera.position.z,
                yaw: this.player.yaw, isWalking: isWalking, falling: this.player.falling
            });
            mqttClient.publish(currentTopic, payload, { qos: 0 });
        }

        this.animateMultiplayer(time);
        this.renderer.render(this.scene, this.camera);
    }
}

let mqttClient = null;
let currentTopic = '';
const myPlayerId = Math.random().toString(36).substring(2, 9); 
let globalRemoteData = null; 

function generateNumberCode() { 
    return Math.floor(10000 + Math.random() * 90000).toString(); 
}

function initFullscreen() {
    if(document.getElementById('fullscreen-toggle').checked) {
        const docEl = document.documentElement;
        if (docEl.requestFullscreen) docEl.requestFullscreen();
        else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
    }
}

function startGame() {
    initFullscreen();
    document.getElementById('ui-layer').style.display = 'none';
    document.getElementById('joystick-left').style.display = 'block';
    document.getElementById('joystick-right').style.display = 'block';
    document.getElementById('crosshair').style.display = 'block';
    
    const game = new Game();
    game.audio.startAtmosphere();
    document.getElementById('game-canvas').style.opacity = 1;
    game.animate();
}

function showError(msg) {
    const errDiv = document.getElementById('error-msg');
    errDiv.innerText = msg;
    errDiv.style.display = 'block';
    setTimeout(() => errDiv.style.display = 'none', 6000);
}

function connectToRoom(code, isHost) {
    currentTopic = 'backrooms_game_2026_x_' + code;
    const brokerUrl = 'wss://broker.emqx.io:8084/mqtt'; 
    
    if (isHost) {
        document.getElementById('host-status').innerText = 'Подключение...';
    } else {
        document.getElementById('connect-btn').innerText = 'ПОДКЛЮЧЕНИЕ...';
        document.getElementById('connect-btn').disabled = true;
    }

    try {
        mqttClient = mqtt.connect(brokerUrl);

        mqttClient.on('connect', function () {
            mqttClient.subscribe(currentTopic);
            
            if (isHost) {
                document.getElementById('host-status').innerText = 'Готово! Скажи код сестре.';
                document.getElementById('host-status').style.color = '#5cbf5c';
            } else {
                startGame(); 
            }
        });

        mqttClient.on('message', function (topic, message) {
            try {
                let data = JSON.parse(message.toString());
                if (data.id !== myPlayerId) {
                    globalRemoteData = data;
                    // ИСПРАВЛЕНИЕ: Записываем ЛОКАЛЬНОЕ время получения. 
                    // Это лечит баг, когда часы на телефонах рассинхронизированы.
                    globalRemoteData.localReceiptTime = Date.now(); 
                }
            } catch (e) {}
        });

        mqttClient.on('error', function (error) {
            if(!isHost) {
                showError('Ошибка сервера связи.');
                document.getElementById('connect-btn').innerText = 'ПОДКЛЮЧИТЬСЯ';
                document.getElementById('connect-btn').disabled = false;
            }
        });
    } catch (err) {
        showError('Не удалось инициировать соединение. Выключите VPN.');
    }
}

});
